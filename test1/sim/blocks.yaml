# ============================================================================
# Curated test-block catalog for the test1 schematic.
#
# This is the LIBRARY surfaced in the Simulation tab. Each entry is a testable
# sub-circuit: what sheet (netlist/<sheet>.yaml) it comes from, which simulation
# types apply (rationale + a concrete pass criterion), which behavioral models
# it needs, and what boundary stub sits on each cut edge.
#
# BOUNDARY vs EXTRACTED — what lives here vs what comes from the netlist:
#   • This file holds ONLY the genuinely OFF-SHEET boundary: the world outside
#     the slice being simulated. Those params are engineering estimates that are
#     NOT in the schematic and so are curated here:
#        R_src / L_src   — supply source impedance (board/LAYOUT estimate)
#        t_on            — enable timing (FPGA FIRMWARE, off-schematic)
#        I_base / I_step — downstream load current (the DUT's behavior)
#        rail V          — the nominal incoming-rail voltage
#        pass:           — the spec/acceptance criterion
#   • COMPONENT VALUES that ARE in the design (decoupling caps, the bias sense
#     resistor R40/R41, jumpers) are NOT duplicated here — the deck builders read
#     them from netlist/<sheet>.yaml via test1/sim/design_extract.py, so a design
#     change flows straight into the sim. (Caps were always extracted; the sense
#     R moved from a hardcoded constant to extraction.)
#
# Reviewer notes (Mason): the numbers in `pass` and the BOUNDARY `params` are the
# curation to check — first-pass estimates from datasheets + the YAML notes; flag
# any to tighten. Stubs reference shapes in stubs.py; models in models.py.
#
# status values:
#   implemented      — deck builder exists and runs today
#   planned          — curated here, deck builder not yet written
#   not_simulatable  — no useful SPICE behavior; documented so the tab can
#                      show *why* rather than silently omitting the sheet.
#
# group — the FUNCTIONAL domain a block belongs to, used to organize the
# Simulation tab + sidebar into named, collapsible sections (the signal chain as
# an engineer reads it). The GUI orders + labels groups via SIM_GROUPS in
# test1/gui/backend/app.py (canonical order + display name + one-line blurb); a
# block with no `group` falls into "other". Current groups:
#   power_generation     — how a rail is MADE (LDO + load switch)
#   power_distribution   — how a rail is DELIVERED to the chip (decap/PDN banks)
#   analog_bias          — precision analog signal-conditioning (the V-to-I loop)
#   system_integration   — multi-block / whole-board composition tests
#   not_simulatable      — documented gaps (connectors, digital-only, EEPROM)
# To add a group: pick a snake_case id, tag the blocks, and add it to SIM_GROUPS.
# ============================================================================

blocks:

  # --------------------------------------------------------------------------
  - id: ldo_rail
    title: LDO power rail (TPS7A8401A + TPS22916)
    sheet: power.yaml
    group: power_generation
    status: implemented
    description: >
      The +VDDIO supply rail: +3V3 feeds a TPS7A8401A adjustable LDO, whose
      output passes through a TPS22916 load switch to +VDDIO, with full input
      and output decoupling. The LDO output voltage is pin-selectable.
    models_needed: [LDO_TPS7A8401A, SW_TPS22916]
    datasheets:
      - { mpn: TPS7A8401A, file: tps7a84a.pdf }
      - { mpn: TPS22916CNYFPR, file: TPS22916CNYFPR.pdf }
    # Base boundaries describe the steady, rails-already-up case (== op-point).
    # Each sim_type below overrides only the params that differ for its test.
    # All params here are OFF-SHEET boundary values (see header) — the LDO/switch
    # decoupling caps are read from power.yaml/bobcat.yaml by design_extract.
    boundaries:
      "+3V3":   { stub: RailIn,       params: { V: 3.3, R_src: 0.020 } }
      LDO_EN:   { stub: DigitalDrive, params: { t_on: 0 } }      # static-high
      LSW_EN:   { stub: DigitalDrive, params: { t_on: 0 } }      # static-high
      "+VDDIO": { stub: RailOut,      params: { I_base: 0.010 } } # steady 10mA
      LDO_PG:   { stub: DigitalOut,   params: { pull_to: V3V3, R_pull: 10e3 } }
    sim_types:
      - type: dc_op_point
        rationale: Confirm every rail settles where it should and the LDO isn't in dropout.
        pass: "|V_measured - V_expected| <= 50mV on +3V3/LDO_OUT/VADJ; <= 100mV on +VDDIO (Rdson drop)."
        # Uses base boundaries unchanged (static EN, steady 10mA load).
      - type: transient_powerup
        rationale: >
          With the enables driven in the intended order (LDO before load switch),
          confirm the rails ramp up in sequence and inrush current stays bounded.
        pass: "LDO_OUT crosses 90% before +VDDIO; peak inrush <= 1A."
        boundary_overrides:
          LDO_EN:   { t_on: 100e-6 }       # ASSUMED FPGA timing: LDO enable at 100us
          LSW_EN:   { t_on: 600e-6 }       # ASSUMED FPGA timing: switch enable at 600us
          "+VDDIO": { R_load: 36 }          # resistive load (tracks rising rail)
      - type: transient_load_step
        rationale: The decoupling must hold +VDDIO steady when Bobcat's load current jumps.
        pass: "Droop on +VDDIO <= 50mV and recovery to within 25mV <= 100us for a 10->100mA step."
        boundary_overrides:
          "+VDDIO": { I_step: 0.090, t_step: 8e-3 }   # 10 -> 100mA step, after the 3ms switch turn-on settles
      - type: line_regulation
        rationale: Output must hold regulation as the FMC +3V3 rail varies across tolerance.
        pass: "Vout span <= 10mV across +3V3 = 3.0..3.6V, and mean Vout within 50mV of setpoint."
        # Uses base boundaries (static EN, steady load); the deck sweeps the +3V3 source.
      - type: setpoint_coverage
        rationale: >
          The ANY-OUT LDO exposes several selectable rails (LDO_SET_*). Every
          selectable output must regulate with dropout headroom, not just one.
        pass: "Each setpoint (0.8/1.0/1.2/1.5/1.8V) regulates within 50mV with >=0.3V headroom."
        # Runs a DC op-point per setpoint internally (no single deck / boundary set).
      - type: output_noise
        status: planned
        rationale: The low-noise LDO feeds sensitive analog; rail noise density matters.
        pass: "Integrated output noise within budget (TBD)."
        defer_reason: "Behavioral LDO is noiseless; a .noise run needs the TPS7A8401A noise-density spec to mean anything."
    notes: >
      VADJ is tied to LDO_OUT through the jumper (RJUMP) rather than stubbed,
      since in normal operation the LDO sets the rail the load switch passes.
      LDO_SET_* are not stubbed individually; the selected setpoint is the
      VOUT_SET parameter.

  # --------------------------------------------------------------------------
  - id: opa_bias
    title: V-to-I bias loop (OPA2388 + PMZ1200 PMOS)
    sheet: bias.yaml
    group: analog_bias
    status: implemented
    description: >
      A per-channel precision current source. An MCP4728 DAC sets the target;
      an OPA2388 op-amp drives a PMOS so its source, returned to +3V3 through a
      5.11k 0.1% sense resistor, tracks the DAC voltage. The PMOS drain feeds a
      2N7002 isolation FET out to BIASx. The closed loop sets the bias current
      to (3V3 - V_DAC) / 5.11k, giving 0 to 646uA as the DAC sweeps down.
    models_needed: [OPA2388, PMOS_PMZ1200, NMOS_2N7002]
    datasheets:
      - { mpn: OPA2388, file: opa2388.pdf }
      - { mpn: MCP4728, file: 22187E.pdf }
      - { mpn: PMZ1200UPEYL, file: PMZ1200UPE.pdf }
      - { mpn: 2N7002, file: 2n7002.pdf }
      - { mpn: TNPW06035K11BEEA, file: tnpw_e3.pdf }
    # OFF-SHEET boundary only. The 5.11k sense resistor (R40/R41) is NOT here —
    # the deck reads it from bias.yaml via design_extract.sense_resistance().
    boundaries:
      "+3V3": { stub: RailIn,        params: { V: 3.3, R_src: 0.020 } }
      BIAS0: { stub: AnalogOutLoad, params: { R_load: 100, C_load: 20e-12 } }
      BIAS_ISO0:   { stub: DigitalDrive,  params: { t_on: 0, V_hi: 3.3 } }   # isolator ON
    sim_types:
      - type: dc_sweep
        rationale: >
          The headline accuracy spec: sweep the DAC across its range and check the
          delivered bias current tracks the ideal (3V3 - V_DAC) / 5.11k.
        pass: "I_BIAS error vs ideal <= 1% from 10% to 100% of full-scale (646uA)."
      - type: dc_compliance
        rationale: >
          Bobcat draws its bias with the BIASx pin near 0.5V, nominally 320uA.
          Holding BIAS0 at 0.5V, confirm the loop still delivers the ideal current
          across the range (and ~320uA at the nominal point) with enough headroom.
        pass: "I_BIAS error vs ideal <= 1% (and within 1% of 320uA at nominal) with BIAS0 held at 0.5V; PMOS drain >= 0.5V."
      - type: ac_stability
        rationale: >
          The op-amp, the PMOS gate's capacitance, and the sense resistor form a
          feedback loop that can ring. Closed-loop peaking stands in for phase margin.
        pass: "Closed-loop peaking <= 3 dB (≈ phase margin >= 45 degrees)."
      - type: transient_settling
        rationale: After a new DAC code is written, the bias current must settle cleanly without ringing.
        pass: "Bias current settles within 1% <= 50us, no sustained oscillation, for a mid-scale step."
      - type: por_failsafe
        rationale: >
          Safety gate: at power-on the DAC wakes at full scale and the isolation
          FET is held off, so almost no bias should reach Bobcat until it's enabled.
        pass: "Bias current into Bobcat at power-on <= 1uA."
        boundary_overrides:
          BIAS_ISO0: { V_hi: 0 }     # isolator OFF (gate pull-down at POR)
      - type: monte_carlo_accuracy
        status: planned
        rationale: >
          Worst-case accuracy comes from a tolerance stack-up (the 0.1% sense
          resistor plus op-amp offset spread); nominal-value runs can't sign it off.
        pass: "3-sigma I_bias error <= 1% across the regulated range."
        defer_reason: "Needs a Monte Carlo run that varies the sense resistor and op-amp offset. No new device models required."
      - type: output_noise
        status: planned
        rationale: >
          BIASx output noise directly corrupts Bobcat's measurement, so it's part
          of the precision spec.
        pass: "Integrated BIASx RMS current noise within budget (TBD per load)."
        defer_reason: "The behavioral op-amp is noiseless; a noise run needs the OPA2388 voltage-noise density and 1/f corner to be meaningful."
      - type: temp_drift
        status: planned
        rationale: Accuracy over temperature (op-amp offset drift + sense-R tempco).
        pass: "I_bias drift <= 0.5% over 0..70 C."
        defer_reason: "Needs tempco data (op-amp Vos drift, R tempco) the behavioral models don't carry."
    notes: >
      Single channel (ch-0); ch-1 is identical. The MCP4728 is INSIDE the
      block — I2C control isn't simulated; the DAC output is a programmable
      source we sweep/step. The BIAS0 output is wrapped with an ammeter in the
      deck (low-compliance current-input load) so the delivered current is
      measurable. Behavioral op-amp: good for accuracy/stability/settling, but
      NOT noise (see opa_bias_noise, deferred).

  # --------------------------------------------------------------------------
  - id: vddio_pdn
    title: VDDIO decoupling network (PDN)
    sheet: bobcat.yaml
    group: power_distribution
    status: implemented
    description: >
      The +VDDIO decoupling bank (the C24-C29 capacitors plus bulk). Tests the
      power-distribution network Bobcat sees, independent of how +VDDIO is made.
      Each capacitor is modeled with its real ESR and ESL.
    models_needed: []
    sim_types:
      - type: transient_load_step
        rationale: >
          The core decoupling check: a fast load step shows whether the capacitor
          bank can supply the sudden charge demand and hold the rail.
        pass: "Droop <= 30mV for a 50->250mA step (100ns edge)."
      - type: ac_pdn_impedance
        status: planned
        rationale: >
          The impedance-vs-frequency profile and its anti-resonance peak. The
          peak height is set mostly by supply-path inductance, which is a layout
          property rather than a schematic one.
        pass: "|Z(+VDDIO)| peak <= 100mOhm across 100kHz-50MHz."
        defer_reason: "The anti-resonance peak is set by board layout inductance, not the schematic, so a trustworthy result needs PCB parasitic extraction. The load step is the schematic-level decoupling check."
    datasheets:
      - { mpn: GRM155R71C104KA88D, file: GRM155R71C104KA88-01.pdf }
      - { mpn: GRM155R70J105KA12D, file: GRM155R70J105KA12-01.pdf }
      - { mpn: Bobcat, file: Bobcat_preview.pdf }
    boundaries:
      "+VDDIO": { stub: RailIn, params: { V: 1.8, R_src: 0.005, L_src: 10e-9, droop_limit_V: 0.030 } }
    notes: >
      Caps modeled with ESR + ESL. Source modeled as R_src + L_src (inductive
      above the VRM bandwidth) so the cap bank actually determines the response
      — without L_src a flat low-Z source masks the decoupling entirely.

  # --------------------------------------------------------------------------
  - id: vddd_pdn
    title: VDDD decoupling network (PDN)
    sheet: bobcat.yaml
    group: power_distribution
    status: implemented
    description: >
      The +VDDD decoupling for Bobcat's digital supply: a 0.1uF and a 1uF
      capacitor (C20, C21). The same PDN treatment as +VDDIO on a smaller bank.
    models_needed: []
    sim_types:
      - type: transient_load_step
        rationale: Confirm the two-capacitor +VDDD bank holds the rail under a load step.
        pass: "Droop <= 50mV for a 50->250mA step (100ns edge)."
      - type: ac_pdn_impedance
        status: planned
        rationale: The impedance-vs-frequency profile; its peak is dominated by layout supply inductance.
        pass: "|Z(+VDDD)| peak <= 200mOhm (fewer caps than +VDDIO, so a looser target)."
        defer_reason: "As with +VDDIO, the anti-resonance peak is a layout property and needs PCB extraction. The load step is the schematic-level check."
    datasheets:
      - { mpn: GRM155R71C104KA88D, file: GRM155R71C104KA88-01.pdf }
      - { mpn: GRM155R70J105KA12D, file: GRM155R70J105KA12-01.pdf }
      - { mpn: Bobcat, file: Bobcat_preview.pdf }
    boundaries:
      "+VDDD": { stub: RailIn, params: { V: 1.8, R_src: 0.010, L_src: 15e-9, droop_limit_V: 0.050 } }
    notes: >
      Only two caps (C20/C21), so the impedance target is looser than VDDIO.

  # --------------------------------------------------------------------------
  - id: vdda1_pdn
    title: VDDA1 decoupling network (PDN)
    sheet: bobcat.yaml
    group: power_distribution
    status: implemented
    description: >
      Bobcat's VDDA1 analog supply: a single 0.1uF capacitor (C22) on the chip
      side of a series 0Ω resistor (R20). Analog rails draw much less transient
      current than the digital ones, so the load step and droop budget are scaled
      down to an analog supply pin.
    models_needed: []
    sim_types:
      - type: transient_load_step
        rationale: >
          Confirm the single 0.1uF capacitor holds the analog rail under a modest
          load step. With only one small cap, this checks the decoupling is adequate.
        pass: "Droop <= 50mV for a 5->25mA step (100ns edge)."
      - type: ac_pdn_impedance
        status: planned
        rationale: The impedance-vs-frequency profile; its peak is dominated by layout supply inductance.
        pass: "|Z(VDDA1)| peak <= 300mOhm (single cap, so the loosest target)."
        defer_reason: "The anti-resonance peak is a layout property and needs PCB extraction. The load step is the schematic-level check."
    datasheets:
      - { mpn: GRM155R71C104KA88D, file: GRM155R71C104KA88-01.pdf }
      - { mpn: Bobcat, file: Bobcat_preview.pdf }
    boundaries:
      internal_VDDA1_path: { stub: RailIn, params: { V: 1.0, R_src: 0.010, L_src: 15e-9, I_base: 0.005, I_step: 0.020, droop_limit_V: 0.050 } }
    notes: >
      VDDA1 = LDO output (0.6-1.0V); V=1.0 is the worst case for droop headroom.
      One decap (C22 0.1uF) on the chip side of R20 (series 0Ω). The 0Ω is
      subsumed into the source path (RAIL_OF_BLOCK scans internal_VDDA1_path).

  # --------------------------------------------------------------------------
  - id: vdda2_pdn
    title: VDDA2 decoupling network (PDN)
    sheet: bobcat.yaml
    group: power_distribution
    status: implemented
    description: >
      Bobcat's VDDA2 analog supply (pins 26 and 27): a single 0.1uF capacitor
      (C23) on the chip side of a series 0Ω resistor (R21). The same analog-scale
      treatment as VDDA1.
    models_needed: []
    sim_types:
      - type: transient_load_step
        rationale: Confirm the single 0.1uF capacitor holds the analog rail under a modest load step.
        pass: "Droop <= 50mV for a 5->25mA step (100ns edge)."
      - type: ac_pdn_impedance
        status: planned
        rationale: The impedance-vs-frequency profile; its peak is dominated by layout supply inductance.
        pass: "|Z(VDDA2)| peak <= 300mOhm (single cap, so the loosest target)."
        defer_reason: "The anti-resonance peak is a layout property and needs PCB extraction. The load step is the schematic-level check."
    datasheets:
      - { mpn: GRM155R71C104KA88D, file: GRM155R71C104KA88-01.pdf }
      - { mpn: Bobcat, file: Bobcat_preview.pdf }
    boundaries:
      internal_VDDA2_path: { stub: RailIn, params: { V: 1.0, R_src: 0.010, L_src: 15e-9, I_base: 0.005, I_step: 0.020, droop_limit_V: 0.050 } }
    notes: >
      VDDA2 (pins 26+27 tied) = LDO output (0.6-1.0V); V=1.0 worst case for
      droop. One decap (C23 0.1uF) on the chip side of R21 (series 0Ω).

  # --------------------------------------------------------------------------
  - id: system_sequencing
    title: System-level multi-rail sequencing
    sheet: (power + bias + bobcat)
    group: system_integration
    status: planned
    description: >
      The whole-board integration test: +3V3 through the LDO to every rail
      (+VDDD, +VDDA1, +VDDA2, +VDDIO) plus the bias enable, confirming a safe
      bring-up order and that no bias reaches Bobcat until every rail is up. Each
      block's own power-up is already covered; this ties them together.
    models_needed: []
    sim_types:
      - type: multi_rail_sequencing
        status: planned
        rationale: Confirm a safe whole-board bring-up order and that bias stays off until the rails are up.
        pass: "All rails settle in the intended order; bias current = 0 until rails are up."
        defer_reason: "Combines the individual power and bias models into one integration test — best built after the per-block sims are accepted."

  # --------------------------------------------------------------------------
  # Not simulatable — documented so the tab explains the gap.
  # --------------------------------------------------------------------------
  - id: eeprom
    title: I2C EEPROM (24AA08)
    sheet: eeprom.yaml
    group: not_simulatable
    status: not_simulatable
    reason: >
      A digital I2C device on +3V3 with a decoupling capacitor. There's no analog
      behavior worth simulating — correctness here is protocol and addressing,
      which the design review checks rather than simulation.

  - id: fmc
    title: VITA 57.1 FMC connector (ASP-134606-01)
    sheet: fmc.yaml
    group: not_simulatable
    status: not_simulatable
    reason: >
      A connector and 0Ω routing network with no active devices. Correctness here
      is pinout and routing, checked by the design review. Signal integrity of the
      LA bank is a PCB-layout concern, not a schematic-level one.

  - id: connectors
    title: SMAs / GPIO header / GND clips
    sheet: connectors.yaml
    group: not_simulatable
    status: not_simulatable
    reason: >
      Passive coaxial and header connectors with 0Ω series elements. There's
      nothing to bias or solve — any meaningful analysis (SMA impedance, return
      loss) is PCB-layout territory, not schematic-level.
