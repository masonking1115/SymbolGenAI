  internal_LA17_stub: { type: internal, members: [J2:u2.D20, R117.2] }
  internal_LA18_stub: { type: internal, members: [J1:u1.C22, R118.2] }
  internal_LA19_stub: { type: internal, members: [J4:u4.H22, R119.2] }
