# FMC sheet — VITA 57.1 LPC connector (ASP-134606-01, 160 pins across 4 rows).
#
# The ASP-134606-01 symbol is multi-unit: unit 1 = row C, unit 2 = row D,
# unit 3 = row G, unit 4 = row H. To keep the schematic readable, each row
# is given its own refdes (J1=u1=C, J2=u2=D, J3=u3=G, J4=u4=H), so each
# refdes carries only ONE unit. YAML members use `Jx:uN.PIN` syntax.
#
# PINOUT (2026-05-27): all FMC pins below are the ACTUAL VITA 57.1 LPC connector
# positions per fmchub.github.io/appendix/VITA57_FMC_HPC_LPC_SIGNALS_AND_PINOUT.html
# (LPC table). A prior revision had rows C<->D and G<->H transposed (a mirrored
# read of the connector); that put signals on GND pins and shorted +3V3/VADJ.
# VITA 57.1 pin NAMES mate 1:1 (mezzanine Cn <-> carrier Cn) — the footprint
# does the physical mirror, not the netlist.
#
# LA-bank routing: each named signal is wired FMC-pin → 0Ω (R100-R127) →
# global_label or hier_label. The 0Ω splits each into two schematic nets:
#   • LABELED side (R<n>.1 + label) = the named cross-sheet net
#   • FMC-pin side stub (FMC pin + R<n>.2) = internal (enumerated below)
# Signal→LA-index is OUR assignment (PPT p.5 leaves the LA pin choice to us);
# LA-index→connector-pin is fixed by VITA 57.1 (each = the LA_P pin).
#
# GND on the FMC sheet is bussed per-row from all unrouted/non-named pins
# onto a single GND symbol. Only the explicit STRAPPING pins (PRSNT_M2C_L=H2,
# GA0=C34, GA1=D35) are listed in the GND net here; the mass GND-bussed pins
# are uncovered by validation.

parts:
  J1: { lib_id: Lib:ASP-134606-01, value: FMC LPC (C), footprint: Connector:FMC_LPC_ASP-134606-01, units: [1] }
  J2: { lib_id: Lib:ASP-134606-01, value: FMC LPC (D), footprint: Connector:FMC_LPC_ASP-134606-01, units: [2] }
  J3: { lib_id: Lib:ASP-134606-01, value: FMC LPC (G), footprint: Connector:FMC_LPC_ASP-134606-01, units: [3] }
  J4: { lib_id: Lib:ASP-134606-01, value: FMC LPC (H), footprint: Connector:FMC_LPC_ASP-134606-01, units: [4] }

  # LA-bank routing resistors (R100–R127, 0Ω, one per named LA signal).
  # Note "(LA<nn>_P @ <pin>)" = the VITA 57.1 LPC P-pin the signal lands on.
  R100: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SAMPLE_OUTV  LA00_P @ G6" }
  R101: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SAMPLE_OUT0  LA01_P @ D8" }
  R102: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SAMPLE_OUT1  LA02_P @ H7" }
  R103: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SAMPLE_OUT2  LA03_P @ G9" }
  R104: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SAMPLE_OUT3  LA04_P @ H10" }
