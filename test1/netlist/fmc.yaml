  R122: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LDO_SET_25mV  LA22_P @ G24" }
  R123: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LDO_SET_50mV  LA23_P @ D23" }
  R124: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LDO_SET_100mV  LA24_P @ H28" }
  R125: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LDO_SET_200mV  LA25_P @ G27" }
  R126: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LDO_SET_400mV  LA26_P @ D26" }
  R127: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LDO_SET_800mV  LA27_P @ C26" }

nets:
  # ===== Power & strapping =====
  +3V3:
    type: power
    # VITA 57.1 LPC 3P3V pins: C39, D36, D38, D40.
    members: [J1:u1.C39, J2:u2.D36, J2:u2.D38, J2:u2.D40]
  GND:
    type: power
    # Strapping pins tied to GND — H2=PRSNT_M2C_L (asserts mezzanine presence),
    # C34=GA0, D35=GA1 (geographical address straps). Mass GND bussing of the
    # unrouted FMC pins is uncovered by validation (see top comment).
    members: [J4:u4.H2, J1:u1.C34, J2:u2.D35]

  # ===== Hier-label nets (FMC ↔ this sheet's parent → Power) =====
  # VITA 57.1 LPC VADJ pins: G39, H40.
  VADJ:   { type: hier, direction: output, members: [J3:u3.G39, J4:u4.H40] }
  LDO_PG: { type: hier, direction: input,  members: [J1:u1.C1] }   # PG_C2M @ C1
  # LDO_EN / LSW_EN go through 0Ω first (R118/R119) — only the labeled side
  # is the named net.
  LDO_EN: { type: hier, direction: output, members: [R118.1] }
  LSW_EN: { type: hier, direction: output, members: [R119.1] }

  # ===== Global-label nets (Bobcat ↔ FMC via 0Ω) — labeled-side members only =====
  # VITA 57.1 LPC I²C pins: SCL=C30, SDA=C31.
  SCL: { type: global, direction: bidirectional, members: [J1:u1.C30] }
  SDA: { type: global, direction: bidirectional, members: [J1:u1.C31] }
  SAMPLE_OUTV: { type: global, direction: input, members: [R100.1] }
  SAMPLE_OUT0: { type: global, direction: input, members: [R101.1] }
  SAMPLE_OUT1: { type: global, direction: input, members: [R102.1] }
  SAMPLE_OUT2: { type: global, direction: input, members: [R103.1] }
  SAMPLE_OUT3: { type: global, direction: input, members: [R104.1] }
  SAMPLE_OUT4: { type: global, direction: input, members: [R105.1] }
  SAMPLE_OUT5: { type: global, direction: input, members: [R106.1] }
  SAMPLE_OUT6: { type: global, direction: input, members: [R107.1] }
  SAMPLE_OUT7: { type: global, direction: input, members: [R108.1] }
  MISO:        { type: global, direction: input, members: [R112.1] }
  CS_L:        { type: global, direction: output, members: [R109.1] }
  SCLK:        { type: global, direction: output, members: [R110.1] }
  MOSI:        { type: global, direction: output, members: [R111.1] }
  SPI_DMODE:   { type: global, direction: output, members: [R113.1] }
  RESET_N:     { type: global, direction: output, members: [R114.1] }
  OSC_EN:      { type: global, direction: output, members: [R115.1] }
  WEIGHT_EN:   { type: global, direction: output, members: [R116.1] }
  SAMPLE_TRIG: { type: global, direction: output, members: [R117.1] }
  BIAS_ISO0:   { type: global, direction: output, members: [R120.1] }
  BIAS_ISO1:   { type: global, direction: output, members: [R121.1] }
  LDO_SET_25mV:  { type: global, direction: output, members: [R122.1] }
  LDO_SET_50mV: { type: global, direction: output, members: [R123.1] }
  LDO_SET_100mV: { type: global, direction: output, members: [R124.1] }
  LDO_SET_200mV: { type: global, direction: output, members: [R125.1] }
  LDO_SET_400mV: { type: global, direction: output, members: [R126.1] }
  LDO_SET_800mV:   { type: global, direction: output, members: [R127.1] }

  # ===== Internal stubs (FMC pin → R<n>.2) — one per LA-routed signal =====
  # FMC pins are the VITA 57.1 LPC LA_P positions (see R<n> notes above).
  internal_LA00_stub: { type: internal, members: [J3:u3.G6,  R100.2] }
  internal_LA01_stub: { type: internal, members: [J2:u2.D8,  R101.2] }
  internal_LA02_stub: { type: internal, members: [J4:u4.H7,  R102.2] }
  internal_LA03_stub: { type: internal, members: [J3:u3.G9,  R103.2] }
