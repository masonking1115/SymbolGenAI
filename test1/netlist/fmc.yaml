  R108: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SAMPLE_OUT7  LA08_P @ G12" }
  R109: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "CS_L  LA09_P @ D14" }
  R110: { lib_id: Lib:CRCW04020000Z0ED, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "SCLK  LA10_P @ C14" }
