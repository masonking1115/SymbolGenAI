# FMC sheet — VITA 57.1 LPC connector (ASP-134606-01, 160 pins across 4 rows).
#
# The ASP-134606-01 symbol is multi-unit: unit 1 = row C, unit 2 = row D,
# unit 3 = row G, unit 4 = row H. To keep the schematic readable, each row
# is given its own refdes (J1=u1=C, J2=u2=D, J3=u3=G, J4=u4=H), so each
# refdes carries only ONE unit. YAML members use `Jx:uN.PIN` syntax.
#
# LA-bank routing: each named signal (SAMPLE_OUT*, SPI, OSC/WEIGHT/TRIG,
# LDO_EN/LSW_EN, BIAS_ISO*, LDO_SET_*) is wired FMC-pin → 0Ω (R100-R127) →
# global_label or hier_label. The 0Ω splits each into two schematic nets:
#   • LABELED side (R<n>.1 + label) = the named cross-sheet net
#   • FMC-pin side stub (FMC pin + R<n>.2) = internal (enumerated below)
#
# GND on the FMC sheet is bussed per-row from all unrouted/non-named pins
# onto a single GND symbol. Mass-enumerating ~60 GND pins would be tedious;
# only the explicit STRAPPING pins (PRSNT_M2C_L, GA0, GA1) are listed in
# the GND net here. Unlabeled GND-bussed pins are uncovered by validation.

parts:
  J1: { lib_id: Lib:ASP-134606-01, value: FMC LPC (C), footprint: Connector:FMC_LPC_ASP-134606-01, units: [1] }
  J2: { lib_id: Lib:ASP-134606-01, value: FMC LPC (D), footprint: Connector:FMC_LPC_ASP-134606-01, units: [2] }
  J3: { lib_id: Lib:ASP-134606-01, value: FMC LPC (G), footprint: Connector:FMC_LPC_ASP-134606-01, units: [3] }
  J4: { lib_id: Lib:ASP-134606-01, value: FMC LPC (H), footprint: Connector:FMC_LPC_ASP-134606-01, units: [4] }

  # LA-bank routing resistors (R100–R127, 0Ω, one per named LA signal)
  R100: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA00 SAMPLE_OUTV (H6)" }
  R101: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA01 SAMPLE_OUT0 (C8)" }
  R102: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA02 SAMPLE_OUT1 (G7)" }
  R103: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA03 SAMPLE_OUT2 (H9)" }
  R104: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA04 SAMPLE_OUT3 (G10)" }
  R105: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA05 SAMPLE_OUT4 (C11)" }
  R106: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA06 SAMPLE_OUT5 (D10)" }
  R107: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA07 SAMPLE_OUT6 (G13)" }
  R108: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA08 SAMPLE_OUT7 (H12)" }
