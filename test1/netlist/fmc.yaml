  R110: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA10 SCLK (D14)" }
  R111: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA11 MOSI (G16)" }
  R112: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA12 MISO (H15)" }
  R113: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA13 SPI_DMODE (C17)" }
