  R126: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA26 LDO_SET_800mV (C26)" }
  R127: { lib_id: Device:R, value: "0", footprint: Resistor_SMD:R_0402_1005Metric, notes: "LA27 LDO_SET_1V6 (D26)" }

nets:
  # ===== Power & strapping =====
  +3V3:
    type: power
    members: [J1:u1.C36, J1:u1.C38, J1:u1.C40, J2:u2.D39]
  GND:
    type: power
    # Strapping pins only — H2=PRSNT_M2C_L, C34=GA0, C35=GA1. The mass GND
    # bussing of unrouted FMC pins is uncovered by validation (see top
    # comment). Per-row rails are emitted by the layout.
    members: [J4:u4.H2, J1:u1.C34, J1:u1.C35]

  # ===== Hier-label nets (FMC ↔ this sheet's parent → Power) =====
  VADJ:   { type: hier, direction: output, members: [J3:u3.G40, J4:u4.H39] }
  LDO_PG: { type: hier, direction: input,  members: [J1:u1.C1] }
  # LDO_EN / LSW_EN go through 0Ω first (R118/R119) — only the labeled side
  # is the named net.
  LDO_EN: { type: hier, direction: output, members: [R118.1] }
  LSW_EN: { type: hier, direction: output, members: [R119.1] }

  # ===== Global-label nets (Bobcat ↔ FMC via 0Ω) — labeled-side members only =====
  SCL: { type: global, direction: bidirectional, members: [J2:u2.D30] }
  SDA: { type: global, direction: bidirectional, members: [J2:u2.D31] }
  SAMPLE_OUTV: { type: global, direction: input, members: [R100.1] }
  SAMPLE_OUT0: { type: global, direction: input, members: [R101.1] }
  SAMPLE_OUT1: { type: global, direction: input, members: [R102.1] }
  SAMPLE_OUT2: { type: global, direction: input, members: [R103.1] }
  SAMPLE_OUT3: { type: global, direction: input, members: [R104.1] }
  SAMPLE_OUT4: { type: global, direction: input, members: [R105.1] }
  SAMPLE_OUT5: { type: global, direction: input, members: [R106.1] }
  SAMPLE_OUT6: { type: global, direction: input, members: [R107.1] }
  SAMPLE_OUT7: { type: global, direction: input, members: [R108.1] }
  MISO:        { type: global, direction: input, members: [R112.1] }
  CS_L:        { type: global, direction: output, members: [R109.1] }
  SCLK:        { type: global, direction: output, members: [R110.1] }
  MOSI:        { type: global, direction: output, members: [R111.1] }
  SPI_DMODE:   { type: global, direction: output, members: [R113.1] }
  RESET_N:     { type: global, direction: output, members: [R114.1] }
  OSC_EN:      { type: global, direction: output, members: [R115.1] }
  WEIGHT_EN:   { type: global, direction: output, members: [R116.1] }
  SAMPLE_TRIG: { type: global, direction: output, members: [R117.1] }
  BIAS_ISO0:   { type: global, direction: output, members: [R120.1] }
  BIAS_ISO1:   { type: global, direction: output, members: [R121.1] }
  LDO_SET_50mV:  { type: global, direction: output, members: [R122.1] }
  LDO_SET_100mV: { type: global, direction: output, members: [R123.1] }
  LDO_SET_200mV: { type: global, direction: output, members: [R124.1] }
  LDO_SET_400mV: { type: global, direction: output, members: [R125.1] }
  LDO_SET_800mV: { type: global, direction: output, members: [R126.1] }
  LDO_SET_1V6:   { type: global, direction: output, members: [R127.1] }

  # ===== Internal stubs (FMC pin → R<n>.2) — one per LA-routed signal =====
  internal_LA00_stub: { type: internal, members: [J4:u4.H6,  R100.2] }
  internal_LA01_stub: { type: internal, members: [J1:u1.C8,  R101.2] }
  internal_LA02_stub: { type: internal, members: [J3:u3.G7,  R102.2] }
