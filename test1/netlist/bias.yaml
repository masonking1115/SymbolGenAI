# Bias sheet — MCP4728 quad I²C DAC + 2× channel V-to-I bias loop.
#
# Each bias channel is:
#   V_DAC (MCP4728 VOUTx) → OPA2388 +IN → opamp drives PMOS gate → PMOS source
#   ties to +3V3 through a 5.11 kΩ sense R, opamp -IN feedback samples the
#   source node. PMOS drain → optional 2N7002 NMOS isolator (DNP) → BIASx out.
#   A parallel 0Ω jumper across NMOS D-S keeps the bias path closed when the
#   NMOS is DNP'd (default). 10 kΩ pull-down on each BIAS_ISO gate ensures
#   FET-OFF at POR when the NMOS is populated (E7).
#
# Note: U41 is a dual op-amp (OPA2388), placed as ONE single-unit symbol (the
# Ultra-Librarian part). Channel 0 uses amp A (pins 1/2/3), channel 1 uses amp
# B (pins 5/6/7); V+/V- (8/4) are shared. All members reference unit 1.

parts:
  # ===== Quad I²C DAC =====
  U40:
    lib_id: Lib:MCP4728
    value: MCP4728
    footprint: Package_DFN_QFN:VQFN-10-1EP_3x3mm_P0.5mm_EP1.6x1.6mm
    notes: External VREF=VDD; EEPROM default code 0xFFF → bias OFF at POR
  C40:
    lib_id: Lib:GRM155R71C104KA88D
    value: 0.1uF
    footprint: Capacitor_SMD:C_0402_1005Metric
    notes: VDD decoupling per 22187E Figure 2-1

  # ===== Dual RRIO op-amp (one part, single-unit UL symbol) =====
  U41:
    lib_id: Lib:OPA2388
    value: OPA2388
    footprint: Package_SO:SOIC-8_3.9x4.9mm_P1.27mm
    units: [1]
    notes: Single 8-pin symbol. Amp A (1/2/3)=ch0, amp B (5/6/7)=ch1, V+/V- (8/4) shared.

  # ===== Channel 0 (BIAS0) =====
  Q40:
    lib_id: Lib:PMZ1200UPEYL
    value: PMZ1200UPEYL
    footprint: Package_DFN_QFN:DFN-3-1EP_1.0x1.0mm_P0.65mm_EP0.5x0.5mm
    notes: PMOS pass element for channel 0
  R40:
    lib_id: Lib:TNPW06035K11BEEA
    value: 3.65k 0.1%
    footprint: Resistor_SMD:R_0402_1005Metric
    notes: "Channel-0 sense R. 3.65k sets 0–640 µA FS; was 5.11k, which capped regulated FS at ~484 µA (I·R left no headroom over the 0.5 V DUT compliance)."
  Q42:
    lib_id: Lib:2N7002
    value: "2N7002"
    footprint: Package_TO_SOT_SMD:SOT-23
    notes: "Series isolator — POPULATED by default. Default-off (R44 gate pull-down) so a virgin MCP4728 cannot push bias into Bobcat until FPGA asserts BIAS_ISO0 HIGH (W2 fail-safe)."
  R42:
    lib_id: Lib:CRCW04020000Z0ED
    value: "0"
    footprint: Resistor_SMD:R_0402_1005Metric
    dnp: true
    notes: "Parallel 0Ω override across Q42 D-S — DNP by default. Populate ONLY to disable FPGA isolation and force the bias path closed (e.g. for benchtop standalone use without FPGA control)."
  R44:
    lib_id: Lib:CR0402-FX-1002GLF
    value: 10k
    footprint: Resistor_SMD:R_0402_1005Metric
    notes: BIAS_ISO0 gate pull-down (FET OFF at POR when Q42 populated)
  C42:
    lib_id: Lib:GRM155R71C104KA88D
    value: 0.1uF
    footprint: Capacitor_SMD:C_0402_1005Metric
    notes: Channel-0 +3V3 decoupling near opamp

  # ===== Channel 1 (BIAS1) =====
  Q41:
    lib_id: Lib:PMZ1200UPEYL
    value: PMZ1200UPEYL
    footprint: Package_DFN_QFN:DFN-3-1EP_1.0x1.0mm_P0.65mm_EP0.5x0.5mm
  R41:
    lib_id: Lib:TNPW06035K11BEEA
    value: 3.65k 0.1%
    footprint: Resistor_SMD:R_0402_1005Metric
    notes: "Channel-1 sense R — same 3.65k 0.1% as R40 (sets 0–640 µA FS); see R40 note."
  Q43:
    lib_id: Lib:2N7002
    value: "2N7002"
    footprint: Package_TO_SOT_SMD:SOT-23
    notes: "Series isolator — POPULATED by default. Default-off (R45 gate pull-down) so a virgin MCP4728 cannot push bias into Bobcat until FPGA asserts BIAS_ISO1 HIGH (W2 fail-safe)."
  R43:
    lib_id: Lib:CRCW04020000Z0ED
    value: "0"
    footprint: Resistor_SMD:R_0402_1005Metric
    dnp: true
    notes: "Parallel 0Ω override across Q43 D-S — DNP by default. Populate ONLY to disable FPGA isolation."
  R45:
    lib_id: Lib:CR0402-FX-1002GLF
    value: 10k
    footprint: Resistor_SMD:R_0402_1005Metric
    notes: BIAS_ISO1 gate pull-down
  C43:
    lib_id: Lib:GRM155R71C104KA88D
    value: 0.1uF
    footprint: Capacitor_SMD:C_0402_1005Metric

nets:
  # ===== Power-symbol nets =====
  +3V3:
    type: power
    members:
      - U40.1        # MCP4728 VDD
      - C40.1        # MCP4728 VDD decoupling top
      - U41.8     # OPA2388 V+ (shared, lives in unit-1 drawing only)
      - C42.1        # channel-0 +3V3 decoupling top
      - C43.1        # channel-1 +3V3 decoupling top
      - R40.1        # ch-0 sense R top → +3V3
      - R41.1        # ch-1 sense R top → +3V3
  GND:
    type: power
    members:
      - U40.4        # MCP4728 *LDAC tied to GND
      - U40.10       # MCP4728 VSS
      - C40.2        # MCP4728 VDD decoupling bot
      - U41.4     # OPA2388 V- (shared, unit-1 drawing only)
      - C42.2        # channel-0 +3V3 decoupling bot
      - C43.2        # channel-1 +3V3 decoupling bot
      - R44.2        # ch-0 BIAS_ISO pull-down bot
      - R45.2        # ch-1 BIAS_ISO pull-down bot

  # ===== Hier-label nets (Bias → Bobcat) =====
  BIAS0: { type: hier, direction: output, members: [Q42.2, R42.2] }   # NMOS source + 0Ω jumper rail side
  BIAS1: { type: hier, direction: output, members: [Q43.2, R43.2] }

  # ===== Global-label nets =====
  SCL: { type: global, direction: bidirectional, members: [U40.2] }
  SDA: { type: global, direction: bidirectional, members: [U40.3] }
  BIAS_ISO0: { type: global, direction: input, members: [Q42.1, R44.1] }
  BIAS_ISO1: { type: global, direction: input, members: [Q43.1, R45.1] }

  # ===== Internal nets (unlabeled local connectivity) =====
  internal_VOUTA_to_OPA_pos:
    type: internal
    # MCP4728 VOUTA → OPA2388 unit-1 +IN (pin 3)
    members: [U40.6, U41.3]
  internal_VOUTB_to_OPA_pos:
    type: internal
    # MCP4728 VOUTB → OPA2388 unit-2 +IN (pin 5)
    members: [U40.7, U41.5]
  internal_OPA0_out_to_PMOS_gate:
    type: internal
    # OPA2388 unit-1 OUT (pin 1) → PMOS Q40 gate (pin 1)
    members: [U41.1, Q40.1]
  internal_OPA1_out_to_PMOS_gate:
    type: internal
    # OPA2388 unit-2 OUT (pin 7) → PMOS Q41 gate (pin 1)
    members: [U41.7, Q41.1]
  internal_PMOS0_source_feedback:
    type: internal
    # PMOS Q40 source ↔ R40 bot (sense R) ↔ OPA2388 unit-1 -IN (pin 2)
    members: [Q40.2, R40.2, U41.2]
  internal_PMOS1_source_feedback:
    type: internal
    members: [Q41.2, R41.2, U41.6]
  internal_BIAS0_drain_stub:
    type: internal
    # PMOS Q40 drain → Q42 NMOS drain, also bridged by R42 (0Ω parallel jumper).
    members: [Q40.3, Q42.3, R42.1]
  internal_BIAS1_drain_stub:
    type: internal
    members: [Q41.3, Q43.3, R43.1]

  # MCP4728 pins NC'd in the schematic (validator skips no_connect markers,
  # so leave these unenumerated):
  #   U40.5  RDY/*BSY  — NC
  #   U40.8  VOUTC     — unused, NC
  #   U40.9  VOUTD     — unused, NC
